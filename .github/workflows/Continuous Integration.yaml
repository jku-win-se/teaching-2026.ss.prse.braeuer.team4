name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64

      - name: Compile
        run: mvn compile -q

      - name: Test & coverage check
        run: mvn test

      - name: Regenerate JaCoCo XML report
        if: always()
        run: mvn -q jacoco:report

      - name: Update README coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('target/site/jacoco/jacoco.csv') != ''
        shell: bash
        run: |
          coverage="$(awk -F, 'NR>1 && $1 ~ /^at\.jku\.se\.smarthome\.service(\.|$)/ {miss += $8; cov += $9} END {total = miss + cov; if (total == 0) {print 0} else {printf "%.0f", (cov/total)*100}}' target/site/jacoco/jacoco.csv)"
          color="red"
          if [ "$coverage" -ge 90 ]; then color="brightgreen";
          elif [ "$coverage" -ge 80 ]; then color="green";
          elif [ "$coverage" -ge 70 ]; then color="yellow";
          elif [ "$coverage" -ge 60 ]; then color="orange";
          fi

          badge="[![Coverage](https://img.shields.io/badge/service%20coverage-${coverage}%25-${color})](https://github.com/${{ github.repository }}/actions/workflows/Continuous%20Integration.yaml)"

          if grep -qE '^\[!\[Coverage\]\(' README.md; then
            sed -i -E "s#^\[!\[Coverage\]\(.*#${badge}#g" README.md
          elif grep -qE '^\[!\[codecov\]\(' README.md; then
            sed -i -E "s#^\[!\[codecov\]\(.*#${badge}#g" README.md
          else
            sed -i "3i ${badge}" README.md
          fi

      - name: Commit README coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "ci: update coverage badge [skip ci]"
          git push

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          comment_mode: off
          action_fail: false

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: PMD static analysis
        uses: pmd/pmd-github-action@v2
        id: pmd
        with:
          version: '7.17.0'
          rulesets: 'ruleset.xml'

      - name: Fail build if there are violations
        if: steps.pmd.outputs.violations != 0
        run: exit 1

      - name: Package
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/*.jar
